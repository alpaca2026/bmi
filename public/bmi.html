<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI算出アプリケーション - BMI算出</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span id="username-display"></span>
        </div>
        <div class="header-right">
            <a href="/graph" class="btn btn-link">グラフ表示</a>
            <button id="logout-btn" class="btn btn-secondary">ログアウト</button>
        </div>
    </header>

    <div class="container">
        <h1>BMI算出</h1>

        <div class="card">
            <form id="bmi-form">
                <div class="form-group">
                    <label for="record-date">日付</label>
                    <input type="date" id="record-date">
                </div>
                <div class="form-group">
                    <label for="height">身長 (cm)</label>
                    <input type="number" id="height" step="0.1" placeholder="例: 170">
                </div>
                <div class="form-group">
                    <label for="weight">体重 (kg)</label>
                    <input type="number" id="weight" step="0.1" placeholder="例: 65">
                </div>
                <button type="submit" class="btn btn-primary">算出・保存</button>
            </form>

            <div id="error-area" class="error-area" style="display: none;"></div>

            <div id="result-area" class="result-area" style="display: none;">
                <p>あなたのBMI: <strong id="bmi-value"></strong></p>
                <p>判定: <strong id="bmi-category"></strong></p>
            </div>
        </div>

        <div class="card">
            <h2>履歴一覧</h2>
            <table id="history-table" class="history-table">
                <thead>
                    <tr>
                        <th>日付</th>
                        <th>身長 (cm)</th>
                        <th>体重 (kg)</th>
                        <th>BMI</th>
                        <th>削除</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                </tbody>
            </table>
            <p id="no-records" style="display: none; text-align: center; color: #888;">履歴がありません</p>
        </div>
    </div>

    <script src="/js/bmi.js"></script>
</body>
</html>
